<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SERVA Industrial - Monitoreo Web</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { background-color: #1a1b1e; color: white; font-family: sans-serif; text-align: center; }
        .container { display: flex; justify-content: center; gap: 20px; margin-top: 50px; }
        .card { background: #2a2b2f; padding: 20px; border-radius: 10px; border: 1px solid #00e5ff; width: 200px; }
        .value { font-size: 2em; color: #00e5ff; font-weight: bold; }
        .unit { font-size: 0.5em; color: #5a5c63; }
        h1 { letter-spacing: 5px; color: #5a5c63; }
    </style>
</head>
<body>
    <h1>SERVA INDUSTRIAL SOLUTIONS</h1>
    <div id="status" style="color: #00ff00;">Conectando al servidor...</div>

    <div class="container">
        <div class="card">
            <div>TEMPERATURA</div>
            <div id="temp" class="value">0<span class="unit">°C</span></div>
        </div>
        <div class="card">
            <div>VELOCIDAD</div>
            <div id="vel" class="value">0<span class="unit">RPM</span></div>
        </div>
        <div class="card">
            <div>HORÓMETRO</div>
            <div id="time" class="value" style="font-size: 1.5em;">0:00:00</div>
        </div>
    </div>

    <script>
        // Conexión al mismo broker que Node-RED
        const client = mqtt.connect('wss://test.mosquitto.org:8081');

        client.on('connect', () => {
            document.getElementById('status').innerText = "ONLINE - RECIBIENDO DATOS";
            // IMPORTANTE: Este debe ser el mismo TEMA que pusiste en el nodo mqtt out
            client.subscribe('serva/planta1/monitoreo'); 
        });

        client.on('message', (topic, message) => {
            const data = JSON.parse(message.toString());
            
            // Actualizar la web con los datos recibidos
            document.getElementById('temp').innerHTML = Math.round(data.temperatura) + '<span class="unit">°C</span>';
            document.getElementById('vel').innerHTML = data.velocidad + '<span class="unit">RPM</span>';
            document.getElementById('time').innerText = data.tiempo_total;

            // Alerta visual si la temperatura es alta
            if(data.temperatura > 80) {
                document.getElementById('temp').style.color = "#ff3333";
            } else {
                document.getElementById('temp').style.color = "#00e5ff";
            }
        });
    </script>
</body>
</html>
